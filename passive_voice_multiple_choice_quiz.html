<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>受動態 4択問題ゲーム</title>
  <style>
    :root{
      --bg:#f6f8fb; --card:#fff; --ink:#172033; --muted:#687386;
      --main:#2f6fed; --soft:#eaf1ff; --ok:#10a36f; --ng:#e5484d;
      --line:#dce3ef; --yellow:#fff8e7;
    }
    *{box-sizing:border-box}
    body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif; background:var(--bg); color:var(--ink);}
    header{text-align:center; padding:24px 14px 12px;}
    h1{margin:0 0 8px; font-size:clamp(26px,4.8vw,42px);}
    .sub{color:var(--muted); font-size:15px; line-height:1.6}
    main{max-width:980px; margin:0 auto; padding:0 14px 30px;}
    .panel{background:var(--card); border:1px solid var(--line); border-radius:24px; box-shadow:0 12px 28px rgba(26,42,68,.08); padding:18px;}
    .toprow{display:flex; gap:10px; align-items:center; justify-content:space-between; flex-wrap:wrap; margin-bottom:14px;}
    .badge{background:var(--soft); color:var(--main); font-weight:900; padding:8px 12px; border-radius:999px;}
    .score{font-weight:900; color:var(--muted);}
    .progressWrap{height:12px; background:#edf1f7; border-radius:999px; overflow:hidden; flex:1; min-width:180px;}
    .progress{height:100%; width:0%; background:var(--main); transition:.25s;}
    .questionBox{border:2px solid var(--line); border-radius:20px; padding:18px; background:linear-gradient(180deg,#fff,#fbfdff);}
    .type{font-size:14px; font-weight:900; color:var(--main); margin-bottom:10px;}
    .q{font-family:Georgia,"Times New Roman",serif; font-size:clamp(24px,3.8vw,42px); line-height:1.35; font-weight:800; margin-bottom:16px;}
    .choices{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
    .choice{border:2px solid var(--line); background:white; border-radius:16px; padding:15px; font-size:clamp(17px,2.5vw,24px); font-weight:800; text-align:left; cursor:pointer; transition:.15s;}
    .choice:hover{border-color:var(--main); background:var(--soft);}
    .choice.correct{border-color:var(--ok); background:#e9fbf4; color:#087a50;}
    .choice.wrong{border-color:var(--ng); background:#fff0f0; color:#b42329;}
    .choice:disabled{cursor:default; opacity:1;}
    .result{margin-top:14px; display:none; border-radius:16px; padding:14px; line-height:1.65;}
    .result.ok{display:block; background:#e9fbf4; border:1px solid #a8ecd2;}
    .result.ng{display:block; background:#fff0f0; border:1px solid #ffc9c9;}
    .ja{margin-top:10px; background:var(--yellow); border:1px solid #f1dfac; border-radius:12px; padding:10px;}
    .buttons{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:14px;}
    button{font-size:16px; border:none; border-radius:14px; padding:13px 12px; font-weight:900; cursor:pointer; background:#eef3fb; color:var(--ink);}
    button.primary{background:var(--main); color:white;}
    button.green{background:var(--ok); color:white;}
    button.red{background:var(--ng); color:white;}
    button:active{transform:translateY(1px)}
    .list{margin-top:18px; display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:8px;}
    .item{border:1px solid var(--line); border-radius:12px; background:white; padding:10px; cursor:pointer; font-size:14px; line-height:1.35;}
    .item.active{border-color:var(--main); background:var(--soft);}
    .item.ok{border-color:#a8ecd2; background:#f0fff8;}
    .item.ng{border-color:#ffc9c9; background:#fff7f7;}
    .small{font-size:13px; color:var(--muted); margin-top:10px; line-height:1.6;}
    @media(max-width:680px){
      .choices{grid-template-columns:1fr;}
      .buttons{grid-template-columns:repeat(2,1fr);}
    }
  </style>
</head>
<body>
<header>
  <h1>受動態 4択問題ゲーム</h1>
  <div class="sub">何度も解き直しOK・間違えた問題だけ復習できます</div>
</header>
<main>
  <section class="panel">
    <div class="toprow">
      <div class="badge" id="counter">1 / 23</div>
      <div class="progressWrap"><div class="progress" id="progress"></div></div>
      <div class="score" id="score">正解 0 / 0</div>
    </div>

    <div class="questionBox">
      <div class="type" id="type"></div>
      <div class="q" id="q"></div>
      <div class="choices" id="choices"></div>
      <div class="result" id="result"></div>
    </div>

    <div class="buttons">
      <button id="prevBtn">← 前へ</button>
      <button class="primary" id="nextBtn">次へ →</button>
      <button class="green" id="reviewBtn">間違い復習</button>
      <button class="red" id="resetBtn">最初から</button>
    </div>
    <div class="buttons">
      <button id="shuffleBtn">ランダム</button>
      <button id="normalBtn">番号順</button>
      <button id="showAnswerBtn">答えを見る</button>
      <button id="retryBtn">この問題を解き直す</button>
    </div>
    <div class="small">答えを選ぶと、自動で正誤と解説が出ます。リストから好きな問題に移動できます。</div>
  </section>
  <div class="list" id="list"></div>
</main>

<script>
const questions = [{"type": "例題 012", "q": "This theory ( ____ ) by a lot of scientists.", "choices": ["supports", "supported", "is supported", "has supported"], "answer": "is supported", "ja": "この理論は多くの科学者によって支持されています。", "ex": "主語 This theory は「支持される」側なので受動態 be動詞 + 過去分詞。"}, {"type": "例題 013", "q": "The newborn baby ( ____ ) after its grandfather.", "choices": ["named John", "was named John", "has named John", "named John by"], "answer": "was named John", "ja": "その新生児は祖父にちなんでジョンと名づけられました。", "ex": "赤ちゃんは「名づけられる」側なので was named。"}, {"type": "例題 014", "q": "Choose the correct sentence.", "choices": ["I was spoken to by some tourists on my way home.", "Some tourists I was spoken to by on my way home.", "I was by spoken to some tourists on my way home.", "I was spoken by to some tourists on my way home."], "answer": "I was spoken to by some tourists on my way home.", "ja": "私は帰宅途中に何人かの観光客に話しかけられました。", "ex": "speak to A の受動態は A is spoken to。前置詞 to を忘れません。"}, {"type": "例題 015", "q": "A general election ( ____ ) next month.", "choices": ["is holding", "will hold", "will be held", "will be holding"], "answer": "will be held", "ja": "総選挙が来月行われます。", "ex": "選挙は「行われる」側なので未来の受動態 will be held。"}, {"type": "例題 016", "q": "You can’t drive here because the road ( ____ ) now.", "choices": ["is repairing", "has been repairing", "is being repaired", "has been repaired"], "answer": "is being repaired", "ja": "道路が今修理されているので、ここでは運転できません。", "ex": "now があり、今まさに修理されているので現在進行形の受動態 is being repaired。"}, {"type": "例題 017", "q": "The director ( ____ ) the Oscar several times.", "choices": ["has awarded", "has been awarding", "has been awarded", "is being awarded"], "answer": "has been awarded", "ja": "その監督は何度かオスカーを授与されています。", "ex": "several times があり、経験を表す現在完了の受動態 has been awarded。"}, {"type": "例題 018", "q": "Choose the correct sentence.", "choices": ["He is said to be the model for the main character in the novel.", "He is to be said the model for the main character in the novel.", "He is the model said to be for the main character in the novel.", "He said is to be the model for the main character in the novel."], "answer": "He is said to be the model for the main character in the novel.", "ja": "彼はその小説の主人公のモデルだと言われています。", "ex": "be said to be ～ で「～だと言われている」。"}, {"type": "例題 019", "q": "Ms. Smith is known ( ____ ) the study of Japanese culture.", "choices": ["about", "for", "of", "with"], "answer": "for", "ja": "スミスさんは日本文化の研究で知られています。", "ex": "be known for ～ は「～で知られている」。"}, {"type": "問題 1", "q": "The play Romeo and Juliet was ( ____ ) over 400 years ago.", "choices": ["write", "wrote", "writing", "written"], "answer": "written", "ja": "劇『ロミオとジュリエット』は400年以上前に書かれました。", "ex": "was + 過去分詞。write-wrote-written。"}, {"type": "問題 2", "q": "The sun was hidden ( ____ ) the clouds.", "choices": ["by", "for", "from", "in"], "answer": "by", "ja": "太陽は雲に隠されていました。", "ex": "行為者・原因を表す by。was hidden by the clouds。"}, {"type": "問題 3", "q": "Choose the correct sentence.", "choices": ["This stone is called soapstone because it feels like soap.", "This stone called is soapstone because it feels like soap.", "This stone is soapstone called because it feels like soap.", "This stone is called because soapstone it feels like soap."], "answer": "This stone is called soapstone because it feels like soap.", "ja": "この石は石けんのような感じがするので、ソープストーンと呼ばれています。", "ex": "be called A で「Aと呼ばれる」。"}, {"type": "問題 4", "q": "I was ( ____ ) a stranger in the shopping mall.", "choices": ["spoken by", "spoken to by", "being spoken", "spoken to"], "answer": "spoken to by", "ja": "私はショッピングモールで見知らぬ人に話しかけられました。", "ex": "speak to me の受動態なので I was spoken to by ...。"}, {"type": "問題 5", "q": "The room should ( ____ ) clean at all times.", "choices": ["be kept", "it be kept", "keep", "keep it"], "answer": "be kept", "ja": "その部屋は常に清潔に保たれるべきです。", "ex": "助動詞 should の後は be + 過去分詞。should be kept。"}, {"type": "問題 6", "q": "When I came to this city a year ago, the station was still ( ____ ).", "choices": ["building", "built", "being built", "being build"], "answer": "being built", "ja": "1年前この町に来たとき、その駅はまだ建設中でした。", "ex": "was being built で「建設されているところだった」。"}, {"type": "問題 7", "q": "Michael ( ____ ) as the Most Valuable Player three times.", "choices": ["has selected", "has been selecting", "has been selected", "has being selected"], "answer": "has been selected", "ja": "マイケルは最優秀選手に3回選ばれています。", "ex": "three times があり、経験を表す現在完了の受動態 has been selected。"}, {"type": "問題 8", "q": "( ____ ) the best soccer player in Japan.", "choices": ["People often say him to be", "He is often said that he is", "He is often said to be", "It is often said for him to be"], "answer": "He is often said to be", "ja": "彼は日本で一番のサッカー選手だとよく言われています。", "ex": "be said to be ～ で「～だと言われている」。"}, {"type": "問題 9", "q": "People say that Tokyo is a safe city. = It ( ____ ) that Tokyo is a safe city.", "choices": ["been said", "has said", "is said", "is saying"], "answer": "is said", "ja": "東京は安全な都市だと言われています。", "ex": "It is said that ... で「…だと言われている」。"}, {"type": "問題 10", "q": "Kyoto is known ( ____ ) its beautiful, old temples and shrines.", "choices": ["as", "for", "from", "to"], "answer": "for", "ja": "京都は美しく古い寺や神社で知られています。", "ex": "be known for ～ は「～で知られている」。"}, {"type": "問題 11", "q": "We were running in the park and were ( ____ ) in the rain.", "choices": ["catches", "catching", "caught", "to catch"], "answer": "caught", "ja": "私たちは公園を走っていて、雨にあいました。", "ex": "be caught in the rain で「雨にあう」。"}, {"type": "問題 12", "q": "Robert ( ____ ) in Japanese popular culture such as manga and anime.", "choices": ["is interesting", "is interested", "interested", "interests"], "answer": "is interested", "ja": "ロバートはマンガやアニメなどの日本の大衆文化に興味があります。", "ex": "人が興味を持っているときは be interested in ～。"}, {"type": "Writing 1", "q": "We can see owls at this cafe. 受動態にすると？", "choices": ["Owls can be seen at this cafe.", "Owls can seen at this cafe.", "Owls are can be seen at this cafe.", "Owls can be see at this cafe."], "answer": "Owls can be seen at this cafe.", "ja": "このカフェではフクロウを見ることができます。／フクロウが見られます。", "ex": "助動詞 can の受動態は can be + 過去分詞。"}, {"type": "Writing 2", "q": "Choose the correct sentence.", "choices": ["A new building is being constructed on campus.", "A new building is constructing on campus.", "A new building is constructed being on campus.", "A new building being is constructed on campus."], "answer": "A new building is being constructed on campus.", "ja": "キャンパスに新しい建物が建設中です。", "ex": "現在進行形の受動態 is being constructed。"}, {"type": "Writing 3", "q": "Choose the correct sentence.", "choices": ["This letter has just been delivered.", "This letter has just delivered.", "This letter has been just delivering.", "This letter is just been delivered."], "answer": "This letter has just been delivered.", "ja": "この手紙はちょうど配達されたところです。", "ex": "現在完了の受動態 has been delivered。just は has と been の間に置けます。"}];
let order = questions.map((_,i)=>i);
let pos = 0;
let answered = new Map();
let wrongSet = new Set();

const $ = id => document.getElementById(id);
function currentIndex(){ return order[pos]; }
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function updateScore(){
  let correct = 0;
  answered.forEach((choice, idx)=>{ if(choice === questions[idx].answer) correct++; });
  $('score').textContent = `正解 ${correct} / ${answered.size}`;
}
function render(){
  if(order.length === 0){
    $('counter').textContent = '0 / 0';
    $('progress').style.width = '0%';
    $('type').textContent = '復習する問題はありません';
    $('q').textContent = '全問正解です！';
    $('choices').innerHTML = '';
    $('result').className = 'result ok';
    $('result').innerHTML = 'すばらしいです。もう一度やるときは「最初から」を押してください。';
    buildList(); updateScore(); return;
  }
  const idx = currentIndex();
  const item = questions[idx];
  $('counter').textContent = `${pos+1} / ${order.length}`;
  $('progress').style.width = `${((pos+1)/order.length)*100}%`;
  $('type').textContent = item.type;
  $('q').textContent = item.q;
  $('choices').innerHTML = '';
  const selected = answered.get(idx);

  item.choices.forEach((choice, i)=>{
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.innerHTML = `${i+1}. ${escapeHtml(choice)}`;
    btn.onclick = () => choose(choice);
    if(selected){
      btn.disabled = true;
      if(choice === item.answer) btn.classList.add('correct');
      if(choice === selected && choice !== item.answer) btn.classList.add('wrong');
    }
    $('choices').appendChild(btn);
  });

  if(selected) showResult(selected === item.answer);
  else {
    $('result').style.display = 'none';
    $('result').className = 'result';
    $('result').innerHTML = '';
  }
  buildList(); updateScore();
}
function choose(choice){
  const idx = currentIndex();
  answered.set(idx, choice);
  if(choice === questions[idx].answer) wrongSet.delete(idx);
  else wrongSet.add(idx);
  render();
}
function showResult(isCorrect){
  const item = questions[currentIndex()];
  $('result').style.display = 'block';
  $('result').className = 'result ' + (isCorrect ? 'ok' : 'ng');
  $('result').innerHTML = `
    <b>${isCorrect ? '正解！' : 'もう一度確認！'}</b><br>
    正しい答え：<b>${escapeHtml(item.answer)}</b><br>
    <div class="ja">${escapeHtml(item.ja)}</div>
    <div>${escapeHtml(item.ex)}</div>
  `;
}
function buildList(){
  const list = $('list'); list.innerHTML = '';
  order.forEach((idx,k)=>{
    const selected = answered.get(idx);
    const div = document.createElement('div');
    div.className = 'item' + (k===pos ? ' active' : '') + (selected ? (selected===questions[idx].answer ? ' ok' : ' ng') : '');
    div.innerHTML = `${questions[idx].type}：${escapeHtml(questions[idx].q)}`;
    div.onclick = () => { pos = k; render(); window.scrollTo({top:0, behavior:'smooth'}); };
    list.appendChild(div);
  });
}
function shuffleOrder(){
  for(let i=order.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [order[i],order[j]]=[order[j],order[i]]; }
  pos = 0; render();
}
$('prevBtn').onclick = () => { if(order.length){ pos = (pos - 1 + order.length) % order.length; render(); } };
$('nextBtn').onclick = () => { if(order.length){ pos = (pos + 1) % order.length; render(); } };
$('shuffleBtn').onclick = () => { order = questions.map((_,i)=>i); shuffleOrder(); };
$('normalBtn').onclick = () => { order = questions.map((_,i)=>i); pos=0; render(); };
$('resetBtn').onclick = () => { answered.clear(); wrongSet.clear(); order=questions.map((_,i)=>i); pos=0; render(); };
$('retryBtn').onclick = () => { answered.delete(currentIndex()); render(); };
$('showAnswerBtn').onclick = () => { answered.set(currentIndex(), questions[currentIndex()].answer); wrongSet.delete(currentIndex()); render(); };
$('reviewBtn').onclick = () => { order = [...wrongSet]; pos = 0; render(); };
document.addEventListener('keydown', e=>{
  if(e.key === 'ArrowRight') $('nextBtn').click();
  if(e.key === 'ArrowLeft') $('prevBtn').click();
  if(['1','2','3','4'].includes(e.key) && order.length){
    const item = questions[currentIndex()];
    const ch = item.choices[Number(e.key)-1];
    if(ch && !answered.has(currentIndex())) choose(ch);
  }
});
render();
</script>
</body>
</html>
